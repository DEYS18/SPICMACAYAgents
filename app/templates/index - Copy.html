<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPIC MACAY - Event Registration Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --spicmacay-red: #8B0000;
            --spicmacay-dark: #660000;
            --spicmacay-light: #DC143C;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .main-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            background: linear-gradient(135deg, var(--spicmacay-red) 0%, var(--spicmacay-light) 100%);
            color: white;
            padding: 30px;
            border-radius: 15px 15px 0 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 700;
        }
        
        .header p {
            margin: 10px 0 0 0;
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .chat-container {
            background: white;
            border-radius: 0 0 15px 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .chat-messages {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            text-align: right;
        }
        
        .message.bot {
            text-align: left;
        }
        
        .message-bubble {
            display: inline-block;
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        
        .message.user .message-bubble {
            background: var(--spicmacay-red);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.bot .message-bubble {
            background: #e9ecef;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        
        .message-time {
            font-size: 0.75rem;
            color: #6c757d;
            margin-top: 5px;
        }
        
        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #dee2e6;
        }
        
        .chat-input {
            display: flex;
            gap: 10px;
        }
        
        #user-input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #dee2e6;
            border-radius: 25px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        #user-input:focus {
            outline: none;
            border-color: var(--spicmacay-red);
        }
        
        .btn-send {
            padding: 12px 30px;
            background: var(--spicmacay-red);
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-send:hover {
            background: var(--spicmacay-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(139, 0, 0, 0.3);
        }
        
        .btn-send:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
        }
        
        .typing-indicator {
            display: none;
            padding: 10px;
            text-align: left;
        }
        
        .typing-indicator.active {
            display: block;
        }
        
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #6c757d;
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        .quick-actions {
            padding: 15px 20px;
            background: #f8f9fa;
            border-top: 1px solid #dee2e6;
        }
        
        .quick-action-btn {
            margin: 5px;
            padding: 8px 15px;
            background: white;
            border: 1px solid var(--spicmacay-red);
            color: var(--spicmacay-red);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .quick-action-btn:hover {
            background: var(--spicmacay-red);
            color: white;
        }
        
        .footer-links {
            text-align: center;
            margin-top: 20px;
            padding: 20px;
        }
        
        .footer-links a {
            color: var(--spicmacay-red);
            text-decoration: none;
            margin: 0 15px;
            font-weight: 600;
        }
        
        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <h1>🎭 SPIC MACAY Event Assistant</h1>
            <p>Society for the Promotion of Indian Classical Music and Culture Amongst Youth</p>
        </div>
        
        <div class="chat-container">
            <div class="chat-messages" id="chat-messages">
                <!-- Messages will be added here -->
            </div>
            
            <div class="typing-indicator" id="typing-indicator">
                <span></span>
                <span></span>
                <span></span>
            </div>
            
            <div class="quick-actions">
                <strong>Quick Actions:</strong>
                <button class="quick-action-btn" onclick="sendQuickMessage('I want to register a new event')">
                    Register Event
                </button>
                <button class="quick-action-btn" onclick="sendQuickMessage('Show me upcoming events')">
                    View Events
                </button>
                <button class="quick-action-btn" onclick="sendQuickMessage('I need help')">
                    Help
                </button>
            </div>
            
            <div class="chat-input-container">
                <div class="chat-input">
                    <input 
                        type="text" 
                        id="user-input" 
                        placeholder="Type your message here..." 
                        autocomplete="off"
                    />
                    <button class="btn-send" onclick="sendMessage()" id="send-btn">
                        <i class="fas fa-paper-plane"></i> Send
                    </button>
                </div>
            </div>
        </div>
        
        <div class="footer-links">
            <a href="/dashboard" target="_blank">
                <i class="fas fa-chart-line"></i> Dashboard
            </a>
            <a href="https://spicmacay.org" target="_blank">
                <i class="fas fa-external-link-alt"></i> SPIC MACAY Website
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let sessionId = null;
        const messagesContainer = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        // Initialize chat on page load
        window.onload = async () => {
            await startChat();
        };

        // Start chat session
        async function startChat() {
            try {
                showTyping();
                const response = await fetch('/api/chat/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'}
                });
                
                const data = await response.json();
                
                if (data.success) {
                    sessionId = data.session_id;
                    addMessage(data.message, 'bot');
                } else {
                    addMessage('Sorry, I encountered an error starting the chat. Please refresh the page.', 'bot');
                }
            } catch (error) {
                console.error('Error starting chat:', error);
                addMessage('Connection error. Please check your internet connection and refresh the page.', 'bot');
            } finally {
                hideTyping();
            }
        }

        // Send message
        async function sendMessage() {
            const message = userInput.value.trim();
            
            if (!message) return;
            if (!sessionId) {
                alert('Chat session not initialized. Please refresh the page.');
                return;
            }
            
            // Add user message
            addMessage(message, 'user');
            userInput.value = '';
            
            // Disable input while processing
            setInputState(false);
            showTyping();
            
            try {
                const response = await fetch('/api/chat/message', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: message
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    addMessage(data.response, 'bot');
                } else {
                    addMessage(`Error: ${data.error}`, 'bot');
                }
            } catch (error) {
                console.error('Error sending message:', error);
                addMessage('Sorry, I encountered an error. Please try again.', 'bot');
            } finally {
                hideTyping();
                setInputState(true);
                userInput.focus();
            }
        }

        // Send quick message
        function sendQuickMessage(message) {
            userInput.value = message;
            sendMessage();
        }

        // Add message to chat
        function addMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'message-bubble';
            bubbleDiv.textContent = text;
            
            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = new Date().toLocaleTimeString();
            
            messageDiv.appendChild(bubbleDiv);
            messageDiv.appendChild(timeDiv);
            messagesContainer.appendChild(messageDiv);
            
            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Show typing indicator
        function showTyping() {
            typingIndicator.classList.add('active');
        }

        // Hide typing indicator
        function hideTyping() {
            typingIndicator.classList.remove('active');
        }

        // Set input state
        function setInputState(enabled) {
            userInput.disabled = !enabled;
            sendBtn.disabled = !enabled;
        }

        // Send on Enter key
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
