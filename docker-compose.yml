# Code Generated by Sidekick is for learning and experimentation purposes only.
version: '3.8'

services:
  app:
    build: .
    container_name: spicmacay-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=spicmacay_user
      - DB_PASSWORD=spicmacay_password
      - DB_NAME=spicmacay_db
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - spicmacay-network

  db:
    image: mysql:8.0
    container_name: spicmacay-db
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=spicmacay_db
      - MYSQL_USER=spicmacay_user
      - MYSQL_PASSWORD=spicmacay_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - spicmacay-network

networks:
  spicmacay-network:
    driver: bridge

volumes:
  mysql-data:
